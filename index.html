<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PADOVA Terminal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#F7F3EE;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:25px;

}

.container{

width:100%;
max-width:650px;
text-align:center;

}

.logo{

font-size:58px;
font-weight:bold;
font-style:italic;
color:#EC7A68;

}

.tagline{

margin-top:12px;
margin-bottom:45px;

font-size:18px;

line-height:1.6;

color:#666;

}

.card{

background:white;

border-radius:24px;

padding:34px;

margin-bottom:22px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.25s;

cursor:pointer;

}

.card:hover{

transform:translateY(-3px);

}

.active{

border:4px solid #EC7A68;

}

.disabled{

opacity:.45;
cursor:default;

}

.icon{

font-size:54px;

margin-bottom:15px;

}

.title{

font-size:30px;

font-weight:bold;

color:#444;

}

.subtitle{

margin-top:8px;

color:#999;

}

.version{

margin-top:35px;

font-size:14px;

color:#999;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

PADOVA

</div>

<div class="tagline">

Comfort You Can Trust.<br>

Quality You Can Feel.

</div>

<div class="card active">

<div class="icon">

🕒

</div>

<div class="title">

Absensi

</div>

</div>

<div class="card disabled">

<div class="icon">

📦

</div>

<div class="title">

Stock

</div>

<div class="subtitle">

Segera Hadir

</div>

</div>

<div class="card disabled">

<div class="icon">

🏭

</div>

<div class="title">

Produksi

</div>

<div class="subtitle">

Segera Hadir

</div>

</div>

<div class="card disabled">

<div class="icon">

📦

</div>

<div class="title">

Packing

</div>

<div class="subtitle">

Segera Hadir

</div>

</div>

<div class="version">

PADOVA Terminal Alpha

</div>

</div>

</body>

</html>
